<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Umbra Dev</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #888;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-user-select: none;
      user-select: none;
    }
    .container { text-align: center; }
    .title {
      font-size: 24px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
    }
    .status {
      font-size: 14px;
      margin-bottom: 8px;
      transition: color 0.3s;
    }
    .status.error { color: #ff6b6b; }
    .status.connecting { color: #888; }
    .hint {
      font-size: 12px;
      color: #555;
      margin-top: 16px;
    }
    .hint code {
      background: #1a1a1a;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Umbra Dev</div>
    <div class="spinner"></div>
    <div class="status connecting" id="status">Connecting to dev server...</div>
    <div class="hint">
      Run <code>npx expo start --web --port 8081</code> to start the dev server
    </div>
  </div>
  <script>
    const DEV_URL = 'http://localhost:8081';
    const statusEl = document.getElementById('status');
    let attempts = 0;

    async function checkServer() {
      attempts++;
      try {
        await fetch(DEV_URL, { mode: 'no-cors' });
        statusEl.textContent = 'Connected! Loading app...';
        statusEl.className = 'status';
        statusEl.style.color = '#4ade80';
        setTimeout(() => window.location.replace(DEV_URL), 300);
      } catch (e) {
        statusEl.textContent = `Waiting for dev server... (attempt ${attempts})`;
        statusEl.className = 'status connecting';
        setTimeout(checkServer, 1500);
      }
    }

    checkServer();
  </script>
</body>
</html>
