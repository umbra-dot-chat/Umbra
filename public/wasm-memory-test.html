<!DOCTYPE html>
<html>
<head>
  <title>Umbra WASM Memory Leak Tester</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
    h1 { color: #4ecdc4; }
    #log { white-space: pre-wrap; font-size: 12px; max-height: 70vh; overflow-y: auto; background: #16213e; padding: 10px; border-radius: 4px; }
    button { background: #4ecdc4; color: #1a1a2e; border: none; padding: 8px 16px; margin: 4px; cursor: pointer; font-family: monospace; border-radius: 4px; }
    button:hover { background: #45b7b0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .stats { display: flex; gap: 20px; margin: 10px 0; }
    .stat { background: #16213e; padding: 10px; border-radius: 4px; }
    .stat label { color: #4ecdc4; display: block; font-size: 11px; }
    .stat value { font-size: 18px; }
    .warn { color: #ffbe76; }
    .error { color: #ff7979; }
    .success { color: #7bed9f; }
  </style>
</head>
<body>
  <h1>WASM Memory Leak Tester</h1>
  <p>Standalone harness to replay offline messages through WASM and track per-call memory growth.</p>
  <p>Open Chrome DevTools → Memory tab for heap snapshots alongside this.</p>

  <div class="stats">
    <div class="stat"><label>umbra-core WASM</label><value id="stat-core">--</value></div>
    <div class="stat"><label>sql.js WASM</label><value id="stat-sql">--</value></div>
    <div class="stat"><label>JS Heap</label><value id="stat-heap">--</value></div>
    <div class="stat"><label>Messages</label><value id="stat-msgs">0</value></div>
    <div class="stat"><label>WASM Calls</label><value id="stat-calls">0</value></div>
  </div>

  <div>
    <button id="btn-init" onclick="initWasm()">1. Init WASM</button>
    <button id="btn-connect" onclick="connectRelay()" disabled>2. Connect Relay</button>
    <button id="btn-replay" onclick="replayMessages()" disabled>3. Replay Messages</button>
    <button id="btn-replay1" onclick="replayMessages(1)" disabled>3b. Replay 1 at a time</button>
    <button id="btn-snapshot" onclick="takeSnapshot()">Take Memory Snapshot</button>
    <button id="btn-export" onclick="exportLog()">Export Log</button>
  </div>

  <div id="log"></div>

  <script type="module">
    // === Globals ===
    let wasmPkg = null;
    let wasmExports = null;
    let coreMemory = null;
    let sqlMemory = null;
    let offlineMessages = [];
    let wasmCallCount = 0;
    let processedCount = 0;
    const memoryLog = [];
    const allWasmMemories = [];

    // === Logging ===
    const logEl = document.getElementById('log');
    function log(msg, cls = '') {
      const line = `[${new Date().toISOString().slice(11, 23)}] ${msg}`;
      memoryLog.push(line);
      const span = document.createElement('span');
      span.className = cls;
      span.textContent = line + '\n';
      logEl.appendChild(span);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // === Memory measurement ===
    function getMemStats() {
      const mem = performance.memory;
      const jsHeap = mem ? (mem.usedJSHeapSize / 1024 / 1024).toFixed(1) : '?';
      const jsTotal = mem ? (mem.totalJSHeapSize / 1024 / 1024).toFixed(1) : '?';

      let coreMB = '?', sqlMB = '?';
      for (const { label, memory } of allWasmMemories) {
        try {
          const mb = (memory.buffer.byteLength / 1024 / 1024).toFixed(1);
          if (label.includes('umbra_core')) coreMB = mb;
          else if (label.includes('sql')) sqlMB = mb;
        } catch {}
      }
      // Fallback for core memory
      if (coreMB === '?' && coreMemory?.buffer) {
        coreMB = (coreMemory.buffer.byteLength / 1024 / 1024).toFixed(1);
      }

      return { jsHeap, jsTotal, coreMB, sqlMB };
    }

    function updateStats() {
      const s = getMemStats();
      document.getElementById('stat-core').textContent = s.coreMB + ' MB';
      document.getElementById('stat-sql').textContent = s.sqlMB + ' MB';
      document.getElementById('stat-heap').textContent = s.jsHeap + ' / ' + s.jsTotal + ' MB';
      document.getElementById('stat-msgs').textContent = processedCount + ' / ' + offlineMessages.length;
      document.getElementById('stat-calls').textContent = String(wasmCallCount);
    }

    // Update stats every 500ms
    setInterval(updateStats, 500);

    // === Hook WebAssembly.instantiate BEFORE any WASM loads ===
    const origInstantiate = WebAssembly.instantiate;
    const origStreaming = WebAssembly.instantiateStreaming;

    function captureMemory(result, label) {
      const instance = result?.instance ?? result;
      const mem = instance?.exports?.memory;
      if (mem?.buffer) {
        allWasmMemories.push({ label, memory: mem });
        log(`Captured WASM memory: "${label}" = ${(mem.buffer.byteLength / 1024 / 1024).toFixed(1)}MB`, 'success');
      }
    }

    WebAssembly.instantiate = async function(mod, imports) {
      const label = mod instanceof URL ? mod.toString()
        : mod instanceof Response ? mod.url
        : `wasm-module-${allWasmMemories.length}`;
      const result = await origInstantiate.call(this, mod, imports);
      captureMemory(result, label);
      return result;
    };

    if (origStreaming) {
      WebAssembly.instantiateStreaming = async function(source, imports) {
        const resp = source instanceof Response ? source : await source;
        const label = resp?.url || `wasm-streaming-${allWasmMemories.length}`;
        const result = await origStreaming.call(this, source, imports);
        captureMemory(result, label);
        return result;
      };
    }

    // === Step 1: Init WASM ===
    window.initWasm = async function() {
      document.getElementById('btn-init').disabled = true;
      try {
        log('Loading sql.js...');
        // We need to set up the sql bridge manually
        const initSqlJs = (await import('https://cdn.jsdelivr.net/npm/sql.js@1.13.0/+esm')).default;
        const SQL = await initSqlJs({
          locateFile: () => 'https://cdn.jsdelivr.net/npm/sql.js@1.13.0/dist/sql-wasm.wasm'
        });

        // Try to restore DB from IndexedDB
        let db;
        try {
          const idbData = await loadFromIndexedDB();
          if (idbData) {
            db = new SQL.Database(idbData);
            log('Restored database from IndexedDB', 'success');
          } else {
            db = new SQL.Database();
            log('Created fresh database (no saved state found)', 'warn');
          }
        } catch (e) {
          db = new SQL.Database();
          log('Fresh database (IndexedDB load failed: ' + e.message + ')', 'warn');
        }

        // Set up sql bridge on globalThis
        globalThis.__umbra_sql = {
          init: () => true,
          execute: (sql, paramsJson) => {
            const params = JSON.parse(paramsJson);
            db.run(sql, params);
            return db.getRowsModified();
          },
          query: (sql, paramsJson) => {
            const params = JSON.parse(paramsJson);
            const stmt = db.prepare(sql);
            stmt.bind(params);
            const results = [];
            while (stmt.step()) results.push(stmt.getAsObject());
            stmt.free();
            return JSON.stringify(results);
          },
          executeBatch: (sql) => { db.exec(sql); return true; },
          queryValue: (sql, paramsJson) => {
            const params = JSON.parse(paramsJson);
            const stmt = db.prepare(sql);
            stmt.bind(params);
            let result = 'null';
            if (stmt.step()) {
              const row = stmt.get();
              if (row?.length > 0 && row[0] != null) result = JSON.stringify(row[0]);
            }
            stmt.free();
            return result;
          }
        };

        log('Loading umbra_core WASM...');
        wasmPkg = await import('/umbra_core.js?v=test');
        wasmExports = await wasmPkg.default('/umbra_core_bg.wasm?v=test');
        if (wasmExports?.memory) {
          coreMemory = wasmExports.memory;
          log(`umbra-core memory: ${(coreMemory.buffer.byteLength / 1024 / 1024).toFixed(1)}MB`, 'success');
        }

        log('Calling umbra_wasm_init()...');
        wasmPkg.umbra_wasm_init();

        log('Calling umbra_wasm_init_database()...');
        await wasmPkg.umbra_wasm_init_database();

        // Get DID
        try {
          const did = wasmPkg.umbra_wasm_identity_get_did();
          log('DID: ' + did, 'success');
          window.__testDid = did;
        } catch (e) {
          log('No identity in DB — need to restore from IndexedDB with the right DID', 'error');
          log('Tip: Check localStorage for __umbra_current_did or look at IndexedDB umbra-db-* keys', 'warn');
        }

        const s = getMemStats();
        log(`Init complete. Core=${s.coreMB}MB SQL=${s.sqlMB}MB Heap=${s.jsHeap}MB`);

        document.getElementById('btn-connect').disabled = false;
      } catch (err) {
        log('Init failed: ' + err.message, 'error');
        console.error(err);
        document.getElementById('btn-init').disabled = false;
      }
    };

    // === Step 2: Connect to relay and fetch offline messages ===
    window.connectRelay = async function() {
      document.getElementById('btn-connect').disabled = true;
      const did = window.__testDid;
      if (!did) {
        log('No DID available. Init WASM first with a valid identity.', 'error');
        document.getElementById('btn-connect').disabled = false;
        return;
      }

      log('Connecting to relay...');
      const ws = new WebSocket('wss://relay.umbra.chat/ws');

      ws.onopen = () => {
        log('Connected to relay', 'success');
        ws.send(JSON.stringify({ type: 'register', did }));
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'registered') {
            log(`Registered on relay. Online: ${msg.online_count}`, 'success');
          } else if (msg.type === 'offline_messages') {
            const msgs = msg.messages || [];
            const total = msg.total_messages ?? msgs.length;
            const chunk = (msg.chunk_index ?? 0) + 1;
            const chunks = msg.total_chunks ?? 1;
            offlineMessages.push(...msgs);
            log(`Offline chunk ${chunk}/${chunks}: ${msgs.length} msgs (${offlineMessages.length}/${total} total)`);

            if (chunk >= chunks || msgs.length === 0) {
              log(`All offline messages received: ${offlineMessages.length} total`, 'success');
              document.getElementById('btn-replay').disabled = false;
              document.getElementById('btn-replay1').disabled = false;
              ws.close();
              log('Relay disconnected (messages captured)');
            }
          }
        } catch (e) {
          log('Message parse error: ' + e.message, 'error');
        }
      };

      ws.onerror = (e) => {
        log('WebSocket error', 'error');
        document.getElementById('btn-connect').disabled = false;
      };
    };

    // === Step 3: Replay messages through WASM ===
    window.replayMessages = async function(batchSize = 5) {
      document.getElementById('btn-replay').disabled = true;
      document.getElementById('btn-replay1').disabled = true;

      log(`\n=== REPLAY START: ${offlineMessages.length} messages, batch=${batchSize} ===`);
      const startMem = getMemStats();
      log(`Baseline: Core=${startMem.coreMB}MB SQL=${startMem.sqlMB}MB Heap=${startMem.jsHeap}MB`);

      let lastCoreMB = parseFloat(startMem.coreMB) || 0;
      let lastSqlMB = parseFloat(startMem.sqlMB) || 0;

      for (let i = 0; i < offlineMessages.length; i++) {
        const offlineMsg = offlineMessages[i];
        processedCount = i + 1;

        try {
          const envelope = JSON.parse(offlineMsg.payload);
          const type = envelope.envelope;

          if (type === 'chat_message' && envelope.version === 1) {
            const p = envelope.payload;
            // createDmConversation + storeIncomingMessage — the 2 heaviest WASM calls
            try {
              wasmPkg.umbra_wasm_messaging_create_dm_conversation(p.senderDid);
              wasmCallCount++;
            } catch {}

            const storeJson = JSON.stringify({
              message_id: p.messageId,
              conversation_id: p.conversationId,
              sender_did: p.senderDid,
              content_encrypted: p.contentEncrypted,
              nonce: p.nonce,
              timestamp: p.timestamp,
            });
            try {
              wasmPkg.umbra_wasm_messaging_store_incoming(storeJson);
              wasmCallCount++;
            } catch (e) {
              // May fail on duplicate — that's fine
            }
          } else if (type === 'group_message' && envelope.version === 1) {
            const p = envelope.payload;
            try {
              const decryptJson = JSON.stringify({
                group_id: p.groupId,
                ciphertext: p.ciphertext,
                nonce: p.nonce,
                key_version: p.keyVersion,
                sender_did: p.senderDid,
                timestamp: p.timestamp,
              });
              wasmPkg.umbra_wasm_group_decrypt_message(decryptJson);
              wasmCallCount++;
            } catch (e) {
              // Decryption may fail if key not available
            }
          } else if (type === 'message_status' && envelope.version === 1) {
            const p = envelope.payload;
            try {
              const statusJson = JSON.stringify({
                message_id: p.messageId,
                status: p.status,
              });
              wasmPkg.umbra_wasm_messaging_update_status?.(statusJson);
              wasmCallCount++;
            } catch {}
          }
          // Other envelope types have minimal WASM impact
        } catch (e) {
          // Parse error — skip
        }

        // Log memory every N messages
        if (i > 0 && i % batchSize === 0) {
          // Yield to event loop
          await new Promise(r => setTimeout(r, 50));

          const s = getMemStats();
          const coreMB = parseFloat(s.coreMB) || 0;
          const sqlMB = parseFloat(s.sqlMB) || 0;
          const coreDelta = (coreMB - lastCoreMB).toFixed(1);
          const sqlDelta = (sqlMB - lastSqlMB).toFixed(1);

          const cls = (coreMB - lastCoreMB > 10 || sqlMB - lastSqlMB > 10) ? 'error'
            : (coreMB - lastCoreMB > 1 || sqlMB - lastSqlMB > 1) ? 'warn' : '';
          log(`msg ${i}/${offlineMessages.length}: Core=${s.coreMB}MB(+${coreDelta}) SQL=${s.sqlMB}MB(+${sqlDelta}) Heap=${s.jsHeap}MB calls=${wasmCallCount}`, cls);

          lastCoreMB = coreMB;
          lastSqlMB = sqlMB;
        }
      }

      const endMem = getMemStats();
      const totalCoreGrowth = (parseFloat(endMem.coreMB) - parseFloat(startMem.coreMB)).toFixed(1);
      const totalSqlGrowth = (parseFloat(endMem.sqlMB) - parseFloat(startMem.sqlMB)).toFixed(1);
      log(`\n=== REPLAY DONE ===`);
      log(`Core: ${startMem.coreMB}MB → ${endMem.coreMB}MB (growth: ${totalCoreGrowth}MB)`, totalCoreGrowth > 100 ? 'error' : 'success');
      log(`SQL:  ${startMem.sqlMB}MB → ${endMem.sqlMB}MB (growth: ${totalSqlGrowth}MB)`, totalSqlGrowth > 100 ? 'error' : 'success');
      log(`Heap: ${startMem.jsHeap}MB → ${endMem.jsHeap}MB`);
      log(`WASM calls: ${wasmCallCount}`);

      document.getElementById('btn-replay').disabled = false;
      document.getElementById('btn-replay1').disabled = false;
    };

    // === Snapshot ===
    window.takeSnapshot = function() {
      const s = getMemStats();
      log(`SNAPSHOT: Core=${s.coreMB}MB SQL=${s.sqlMB}MB Heap=${s.jsHeap}/${s.jsTotal}MB msgs=${processedCount} calls=${wasmCallCount}`);
    };

    // === Export ===
    window.exportLog = function() {
      const blob = new Blob([memoryLog.join('\n')], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `wasm-memory-${Date.now()}.log`;
      a.click();
    };

    // === IndexedDB helpers ===
    async function loadFromIndexedDB() {
      // Try to find the current DID from localStorage
      // The app stores it as part of the auth state
      const keys = Object.keys(localStorage).filter(k => k.includes('umbra') || k.includes('did'));
      log('LocalStorage keys with umbra/did: ' + keys.join(', '));

      return new Promise((resolve, reject) => {
        // Look for umbra-db-* databases in IndexedDB
        const req = indexedDB.databases?.();
        if (!req) { resolve(null); return; }
        req.then(dbs => {
          const umbraDbs = dbs.filter(d => d.name?.startsWith('umbra-db'));
          log('IndexedDB databases: ' + umbraDbs.map(d => d.name).join(', '));
          if (umbraDbs.length === 0) { resolve(null); return; }

          // Try to load from the first umbra-db
          const dbName = umbraDbs[0].name;
          const openReq = indexedDB.open(dbName);
          openReq.onsuccess = () => {
            const idb = openReq.result;
            try {
              const tx = idb.transaction('database', 'readonly');
              const store = tx.objectStore('database');
              const getReq = store.get('export');
              getReq.onsuccess = () => {
                if (getReq.result) {
                  log(`Loaded DB from IndexedDB "${dbName}": ${(getReq.result.byteLength / 1024).toFixed(0)}KB`, 'success');
                  resolve(getReq.result);
                } else {
                  resolve(null);
                }
              };
              getReq.onerror = () => resolve(null);
            } catch {
              resolve(null);
            }
          };
          openReq.onerror = () => resolve(null);
        }).catch(() => resolve(null));
      });
    }
  </script>
</body>
</html>
